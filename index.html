<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>loja</title>
    <style>
      *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      } 
      body{

        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
      }
      #container{
        display: flex;
        width: 80%;
        height: 50%;
        margin: auto;
        flex-direction:row; 
        justify-content: center;
        align-items: center;
        gap: 30px;
      }
      .card{
        display: flex;
        flex-direction:column;
        align-items: center;
        border-radius: 10px;
        box-shadow: 0 0 15px rgb(19, 19, 19);
        margin-top: 30px;
      }
      #img{
        width: 200px;
        border-radius: 10px;
        margin: 20px
      }

      button{
        background-color: rgb(53, 148, 53);
        color: white;
        border-radius: 5px;
        font-family:'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
        font-size: medium;
        width: 150px;
        height: 40px;
        cursor: pointer;
        border: 0;
        margin-bottom: 15px;
      }
      h3{
        color: rgb(53, 148, 53);
        margin: 5px;
        font-family: Arial, Helvetica, sans-serif;
        margin-bottom: 15px;
      }
      h2{ 
        font-family: 'Segoe UI', Tahoma;
      }
      h1{
        margin-top: 18%;
        margin: fixed;
        font-family: 'Segoe UI', Tahoma;
      }
    </style>
  </head>
  <body>

    <h1>Minha Loja</h1>

    <div id="container">
      <div class="card">
        <img id="img" src="camisa.webp" alt="">
        <h2>Camisa Esportiva</h2>
        <h3>R$: 399,90</h3>
        <button>Comprar</button>
      </div>
      
      <div id="tam" class="card">
        <img id="img" src="tenis.webp" alt="">
        <h2>Tenis de Corrida</h2>
        <h3>R$: 299,90</h3>
        <button>Comprar</button>
      </div>
      
      <div class="card">
        <img id="img" src="bola.webp" alt="">
        <h2>Bola de Futebol</h2>
        <h3>R$: 99,90</h3>
        <button>Comprar</button>
      </div>
    </div>
  </body>
</html>
